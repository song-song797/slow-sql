services:
  mysql:
    image: mysql:8.0
    container_name: slow-sql-local-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: slow_sql_db
      MYSQL_USER: slow_sql
      MYSQL_PASSWORD: slow_sql
      TZ: Asia/Shanghai
    ports:
      - "3306:3306"
    volumes:
      - ./local-dev/mysql/01-init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -proot --silent"]
      interval: 10s
      timeout: 5s
      retries: 12

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.15.3
    container_name: slow-sql-local-es
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: "-Xms512m -Xmx512m"
      TZ: Asia/Shanghai
    ports:
      - "9200:9200"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:9200/_cluster/health >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20

  es-seed:
    image: curlimages/curl:8.8.0
    container_name: slow-sql-local-es-seed
    depends_on:
      elasticsearch:
        condition: service_healthy
    environment:
      ES_URL: http://elasticsearch:9200
      INDEX_NAME: triangle-mysql-local
    volumes:
      - ./local-dev/es/seed.sh:/seed.sh:ro
    entrypoint: ["sh", "/seed.sh"]
    restart: "no"

  report-stub:
    build:
      context: ./local-report-stub
      dockerfile: Dockerfile
    container_name: slow-sql-local-report-stub
    ports:
      - "18080:18080"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:18080/health').read()"]
      interval: 10s
      timeout: 5s
      retries: 12
